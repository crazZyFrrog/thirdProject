<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Страница не найдена | Мастерская красоты ЛТ</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, system-ui, sans-serif;
        background: linear-gradient(160deg, #faf8f5 0%, #fff 50%, #fdf8f6 100%);
        color: #1f2937;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
        text-align: center;
        background: #fff;
        border-radius: 1.5rem;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      }
      h1 {
        font-size: 4rem;
        font-weight: 700;
        color: #8b5a3c;
        line-height: 1;
        margin-bottom: 0.75rem;
      }
      h2 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        color: #6b7280;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }
      a {
        display: inline-block;
        background: #8b5a3c;
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        padding: 0.875rem 2rem;
        border-radius: 9999px;
        transition: background 0.2s;
      }
      a:hover { background: #734a31; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>404</h1>
      <h2>Страница не найдена</h2>
      <p>Возможно, ссылка устарела. Перейдите на главную — там запись, услуги и контакты салона.</p>
      <a href="/">На главную</a>
    </div>
  </body>
</html>
